services:
  postgres:
    image: postgres:16-alpine
    container_name: news_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: news_db
      POSTGRES_USER: news
      POSTGRES_PASSWORD: news_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U news -d news_db"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
